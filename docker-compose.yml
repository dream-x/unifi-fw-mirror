services:
  sync:
    build: .
    image: unifi-fw-mirror
    restart: unless-stopped
    environment:
      # real value belongs in .env, never here
      UNIFI_FW_PROXY: ${UNIFI_FW_PROXY:-}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-2592000}
    volumes:
      - firmware:/srv/firmware
      - ./config.json:/etc/unifi-fw/config.json:ro

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - firmware:/srv/firmware:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  firmware:
